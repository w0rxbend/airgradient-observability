services:
  caddy:
    image: docker.io/caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - victoriametrics
      - grafana
      - backend
      - frontend
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-vmwriter}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH:?set BASIC_AUTH_HASH}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config

  victoriametrics:
    image: docker.io/victoriametrics/victoria-metrics:v1.144.0
    volumes:
      - vmdata:/storage
    command:
      - "--storageDataPath=/storage"
      - "--graphiteListenAddr=:2003"
      - "--opentsdbListenAddr=:4242"
      - "--httpListenAddr=:8428"
      - "--influxListenAddr=:8089"
    restart: always

  grafana:
    image: docker.io/grafana/grafana:12.2.0
    depends_on:
      - "victoriametrics"
    restart: always
    environment:
      GF_PLUGINS_PREINSTALL: yesoreyeram-infinity-datasource
      GF_SERVER_ROOT_URL: https://${DOMAIN:?set DOMAIN}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./grafana/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./../../dashboards/airgradient-one.json:/var/lib/grafana/dashboards/airgradient-one.json
      - ./../../dashboards/victoriametrics.json:/var/lib/grafana/dashboards/vm.json
      - ./../../dashboards/vmagent.json:/var/lib/grafana/dashboards/vmagent.json
      - ./../../dashboards/metrics-explorer.json:/var/lib/grafana/dashboards/metrics-explorer.json

  backend:
    build:
      context: ../../app/backend
    restart: unless-stopped
    environment:
      ADDR: :8080
      VM_URL: http://victoriametrics:8428
      AIRGRADIENT_LABEL_FILTER: '{device="airgradient_one"}'
      CACHE_TTL: 10s
      RANGE_CACHE_TTL: 30s
      VM_QUERY_TIMEOUT: 10s
      ALLOWED_ORIGIN: https://${DOMAIN:?set DOMAIN}
    depends_on:
      - victoriametrics

  frontend:
    build:
      context: ../../app/frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend

volumes:
  caddydata: {}
  caddyconfig: {}
  vmdata: {}
  grafanadata: {}

services:
  #  Metrics collector.
  #  It scrapes targets defined in --promscrape.config
  #  And forward them to --remoteWrite.url
  vmagent:
    image: docker.io/victoriametrics/vmagent:v1.144.0
    depends_on:
      - "victoriametrics"
    ports:
      - 8429:8429
    volumes:
      - vmagentdata:/vmagentdata
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--promscrape.config=/etc/prometheus/prometheus.yml"
      - "--remoteWrite.url=http://victoriametrics:8428/api/v1/write"
    restart: always
  # VictoriaMetrics instance, a single process responsible for
  # storing metrics and serve read requests.
  victoriametrics:
    image: docker.io/victoriametrics/victoria-metrics:v1.144.0
    ports:
      - 8428:8428
      - 8089:8089
      - 8089:8089/udp
      - 2003:2003
      - 2003:2003/udp
      - 4242:4242
    volumes:
      - vmdata:/storage
    command:
      - "--storageDataPath=/storage"
      - "--graphiteListenAddr=:2003"
      - "--opentsdbListenAddr=:4242"
      - "--httpListenAddr=:8428"
      - "--influxListenAddr=:8089"
      - "--vmalert.proxyURL=http://vmalert:8880"
    restart: always

  grafana:
    image: docker.io/grafana/grafana:12.2.0
    depends_on:
      - "victoriametrics"
    ports:
      - 3005:3000
    restart: always
    environment:
      - GF_PLUGINS_PREINSTALL=yesoreyeram-infinity-datasource
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./grafana/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./../../dashboards/airgradient-one.json:/var/lib/grafana/dashboards/airgradient-one.json
      - ./../../dashboards/victoriametrics.json:/var/lib/grafana/dashboards/vm.json
      - ./../../dashboards/vmagent.json:/var/lib/grafana/dashboards/vmagent.json
      - ./../../dashboards/metrics-explorer.json:/var/lib/grafana/dashboards/metrics-explorer.json

  backend:
    build:
      context: ../../app/backend
    restart: unless-stopped
    environment:
      ADDR: :8080
      VM_URL: http://victoriametrics:8428
      AIRGRADIENT_LABEL_FILTER: '{device="airgradient_one"}'
      CACHE_TTL: 10s
      RANGE_CACHE_TTL: 30s
      VM_QUERY_TIMEOUT: 10s
      ALLOWED_ORIGIN: http://192.168.1.200:3000
    ports:
      - "8080:8080"
    depends_on:
      - victoriametrics

  frontend:
    build:
      context: ../../app/frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "3002:3000"
    depends_on:
      - backend

volumes:
  vmagentdata: {}
  vmdata: {}
  grafanadata: {}